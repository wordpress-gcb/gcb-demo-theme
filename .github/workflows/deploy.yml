name: Deploy theme to Kinsta

# Auto-deploys on every push to main. To trigger from elsewhere or
# manually, use the Actions tab → "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time per branch — if two pushes land back to
# back, queue the second and let the first finish first.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        # SSH_PRIVATE_KEY = paste the private half of the keypair (the public
        # half is added to Kinsta's "SSH Access" panel as an authorized key).
        # SSH_HOST        = Kinsta SSH host (e.g. 11.22.33.44 or example.kinsta.cloud)
        # SSH_PORT        = Kinsta SSH port (often a non-22 number)
        # SSH_USER        = Kinsta SSH user
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST:        ${{ secrets.SSH_HOST }}
          SSH_PORT:        ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rsync theme files
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          # Absolute path on the Kinsta box, e.g.
          # /www/wordpressgcb_123/public/wp-content/themes/gcb-demo-theme
          REMOTE_PATH: ${{ secrets.REMOTE_THEME_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_ed25519" \
            ./ "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"
